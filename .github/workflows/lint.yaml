name: "Lint shell scripts"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: ShellCheck
        run: find src test -name '*.sh' -print0 | xargs -0 shellcheck --severity=error
