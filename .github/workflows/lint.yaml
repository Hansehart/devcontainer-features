name: "Lint shell scripts"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: ShellCheck
        run: find src test -name '*.sh' -print0 | xargs -0 shellcheck --severity=error
