name: "Test features"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # latex runs scenario-only (scheme-basic) so CI avoids the multi-hour
        # scheme-full default install; the scenario carries its own image.
        include:
          - feature: claude-code
            args: "-i mcr.microsoft.com/devcontainers/base:ubuntu-24.04"
          - feature: headless-chrome
            args: "-i mcr.microsoft.com/devcontainers/base:ubuntu-24.04"
          - feature: latex
            args: "--skip-autogenerated"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install the dev container CLI
        run: npm install -g @devcontainers/cli@0.87.0
      - name: "Test ${{ matrix.feature }}"
        run: devcontainer features test -f ${{ matrix.feature }} ${{ matrix.args }} .
